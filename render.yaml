services:
  - type: web
    name: yildiz-deva
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    envVars:
      - key: ADMIN_USER
        value: admin
        scope: run
      - key: ADMIN_PASS
        value: admin123
        scope: run
    # Render'da SQL için kullanıcı oluştur
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
